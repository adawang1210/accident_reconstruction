<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,'PingFang TC',Helvetica,Arial,sans-serif">
  <!-- palette mirrors web_app.html: bg #14161a, bar #0b0c0f, ink #e8e8e8,
       muted #9aa0a6, line #2a2d34, accent #2d6cdf, ok #28d07a -->
  <rect width="1000" height="600" fill="#14161a"/>

  <!-- topbar -->
  <rect x="0" y="0" width="1000" height="34" fill="#0b0c0f"/>
  <line x1="0" y1="34" x2="1000" y2="34" stroke="#000" stroke-width="1"/>
  <text x="16" y="22" fill="#e8e8e8" font-size="14" font-weight="700">事故重建工作台</text>
  <text x="984" y="22" fill="#9aa0a6" font-size="12" text-anchor="end">場景：keelung_xinwu_yier</text>

  <!-- stepper -->
  <g font-size="13">
    <!-- step 1 done -->
    <circle cx="30" cy="58" r="11" fill="#28d07a"/>
    <text x="30" y="62" fill="#07130b" font-size="12" text-anchor="middle" font-weight="700">1</text>
    <text x="48" y="62" fill="#9aa0a6">影片 / 下載</text>
    <text x="150" y="62" fill="#3a3d44">›</text>
    <!-- step 2 active -->
    <circle cx="196" cy="58" r="12" fill="#2d6cdf"/>
    <text x="196" y="62" fill="#fff" font-size="12" text-anchor="middle" font-weight="700">2</text>
    <text x="215" y="62" fill="#ffffff" font-weight="700">校正（GCP）</text>
    <rect x="184" y="74" width="120" height="2" fill="#2d6cdf"/>
    <text x="320" y="62" fill="#3a3d44">›</text>
    <!-- step 3 -->
    <circle cx="366" cy="58" r="11" fill="#2a2d34"/>
    <text x="366" y="62" fill="#cfd2d6" font-size="12" text-anchor="middle">3</text>
    <text x="384" y="62" fill="#9aa0a6">標記車輛</text>
    <text x="476" y="62" fill="#3a3d44">›</text>
    <!-- step 4 -->
    <circle cx="522" cy="58" r="11" fill="#2a2d34"/>
    <text x="522" y="62" fill="#cfd2d6" font-size="12" text-anchor="middle">4</text>
    <text x="540" y="62" fill="#9aa0a6">執行</text>
    <text x="600" y="62" fill="#3a3d44">›</text>
    <!-- step 5 -->
    <circle cx="646" cy="58" r="11" fill="#2a2d34"/>
    <text x="646" y="62" fill="#cfd2d6" font-size="12" text-anchor="middle">5</text>
    <text x="664" y="62" fill="#9aa0a6">結果</text>
  </g>
  <line x1="0" y1="84" x2="1000" y2="84" stroke="#2a2d34" stroke-width="1"/>

  <!-- ============ LEFT PANE: clickable video frame (pixel space) ============ -->
  <text x="16" y="106" fill="#9aa0a6" font-size="12">左圖點像素、右圖點經緯度 → 加入對應點</text>
  <rect x="16" y="116" width="556" height="312" rx="6" fill="#0e0f12" stroke="#2a2d34"/>
  <!-- abstract intersection sketch standing in for the video frame (NOT footage) -->
  <g>
    <polygon points="16,300 572,236 572,300 16,360" fill="#23262c"/>
    <polygon points="250,116 320,116 372,428 198,428" fill="#23262c"/>
    <line x1="40" y1="322" x2="560" y2="262" stroke="#3a3d44" stroke-width="2" stroke-dasharray="10 8"/>
    <line x1="280" y1="130" x2="300" y2="420" stroke="#3a3d44" stroke-width="2" stroke-dasharray="10 8"/>
  </g>
  <!-- marked GCP points (green = ok colour) -->
  <g fill="#28d07a">
    <circle cx="180" cy="300" r="5"/><circle cx="330" cy="270" r="5"/>
    <circle cx="450" cy="252" r="5"/><circle cx="300" cy="360" r="5"/>
  </g>
  <g fill="#0e0f12" font-size="10">
    <rect x="188" y="290" width="22" height="14" rx="3" fill="#0b0c0f"/><text x="192" y="300" fill="#28d07a">g1</text>
    <rect x="338" y="260" width="22" height="14" rx="3" fill="#0b0c0f"/><text x="342" y="270" fill="#28d07a">g2</text>
    <rect x="458" y="242" width="22" height="14" rx="3" fill="#0b0c0f"/><text x="462" y="252" fill="#28d07a">g3</text>
    <rect x="308" y="350" width="22" height="14" rx="3" fill="#0b0c0f"/><text x="312" y="360" fill="#28d07a">g4</text>
  </g>
  <text x="28" y="138" fill="#6b7178" font-size="11">影片畫面（點選像素座標）</text>

  <!-- left controls -->
  <rect x="16" y="438" width="280" height="30" rx="6" fill="#2d6cdf"/>
  <text x="156" y="458" fill="#fff" font-size="13" text-anchor="middle" font-weight="600">存檔並校正</text>
  <rect x="304" y="438" width="120" height="30" rx="6" fill="#2a2d34"/>
  <text x="364" y="458" fill="#cfd2d6" font-size="13" text-anchor="middle">移除上一點</text>
  <text x="16" y="492" fill="#28d07a" font-size="12">✓ 校正完成　mean residual 0.69 m / max 1.96 m　（8 控制點）</text>
  <text x="16" y="514" fill="#9aa0a6" font-size="11">🎯 2D 對齊錨點：右圖地圖點出真實位置 → 「填入」帶入座標，重算後沿道路拉到正確長度。</text>

  <!-- ============ RIGHT PANE: OSM map ============ -->
  <rect x="588" y="92" width="396" height="464" rx="6" fill="#aadaff" stroke="#2a2d34"/>
  <rect x="588" y="92" width="396" height="26" fill="#0b0c0f"/>
  <text x="600" y="110" fill="#e8e8e8" font-size="13" font-weight="600">地圖（OpenStreetMap）</text>
  <!-- stylised street network -->
  <g stroke="#ffffff" stroke-width="11" fill="none" stroke-linecap="round">
    <line x1="588" y1="360" x2="984" y2="300"/>
    <line x1="740" y1="118" x2="800" y2="556"/>
  </g>
  <g stroke="#e7c66b" stroke-width="5" fill="none" stroke-linecap="round">
    <line x1="588" y1="360" x2="984" y2="300"/>
    <line x1="740" y1="118" x2="800" y2="556"/>
  </g>
  <g stroke="#cfe8c6" stroke-width="4" fill="none">
    <line x1="600" y1="200" x2="700" y2="180"/>
    <line x1="850" y1="420" x2="960" y2="470"/>
  </g>
  <!-- GCP markers placed on the map (same green) -->
  <g fill="#28d07a" stroke="#0b0c0f" stroke-width="1.5">
    <circle cx="690" cy="338" r="6"/><circle cx="772" cy="300" r="6"/>
    <circle cx="840" cy="322" r="6"/><circle cx="762" cy="392" r="6"/>
  </g>
  <!-- crosshair = last clicked point -->
  <g stroke="#ff4d4d" stroke-width="2">
    <line x1="772" y1="290" x2="772" y2="310"/><line x1="762" y1="300" x2="782" y2="300"/>
  </g>
  <!-- readout strip -->
  <rect x="588" y="530" width="396" height="26" fill="#0b0c0f" fill-opacity="0.85"/>
  <text x="600" y="548" fill="#9aa0a6" font-size="11">25.134114, 121.747428　— 點地圖任一點即可讀取經緯度（再點此列可複製）</text>
</svg>
